
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TranscribeApp" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3659/3659755.png" />
    <link rel="manifest" href="manifest.json" />
    <title>TranscribeApp</title>
    <link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-slate-950 text-white h-screen w-screen overflow-hidden">
    <div id="root" class="h-full w-full"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js', { scope: './' })
            .then(reg => console.log('TranscribeApp: PWA Pronto'))
            .catch(err => console.warn('PWA Offline desabilitado neste ambiente.'));
        });
      }
    </script>
</body>
</html>
